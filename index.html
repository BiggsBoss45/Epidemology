<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDC ARCHIVE TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
    overflow-x:hidden;
    animation:flicker 4s infinite;
}

/* CRT */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
    pointer-events:none;
}

/* STATIC */
#static{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
    opacity:0.05;
    pointer-events:none;
}

/* ================= BOOT ================= */

#bootScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    z-index:9999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#pressEnter{
    font-size:42px;
    animation:flicker 1s infinite;
}

#bootText{
    margin-top:20px;
    font-size:28px;
}

#cdcCanvas{
    display:none;
}

/* ================= ANIMATIONS ================= */

@keyframes flicker{
    0%{opacity:1;}
    97%{opacity:0.95;}
    100%{opacity:1;}
}

/* ================= MAIN ================= */

.section{display:none;padding:20px;}
.active{display:block;}

button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:320px;
    padding:10px;
    font-size:26px;
}

/* ================= VIDEO ================= */

video{
    width:90%;
    max-width:700px;
    filter:grayscale(1) contrast(1.2);
}

</style>
</head>

<body>

<div id="static"></div>

<!-- BOOT -->
<div id="bootScreen">
    <div id="pressEnter">PRESS ENTER</div>
    <canvas id="cdcCanvas" width="520" height="520"></canvas>
    <div id="bootText"></div>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <h1>CDC ARCHIVE</h1>
    <button onclick="openReports()">NEWS FILES</button>
    <button onclick="openLogs()">AUDIO LOGS</button>
</div>

<!-- REPORTS -->
<div id="reports" class="section">

<h2>VIDEO FILES</h2>

    <div>
        <video controls>
            <source src="video1.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video2.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video3.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video4.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video5.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video6.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video7.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video8.mp4">
        </video>
    </div>
    
    <div>
        <video controls>
            <source src="video9.mp4">
        </video>
    </div>
    
<button onclick="goHome()">BACK</button>
</div>

<!-- AUDIO -->
<div id="logs" class="section">
<h2>AUDIO LOGS</h2>

<button onclick="playAudio('audio1.mp3')">LOG 1</button>
<button onclick="playAudio('audio2.mp3')">LOG 2</button>
<button onclick="playAudio('audio3.mp3')">LOG 3</button>
<button onclick="playAudio('audio4.mp3')">LOG 4</button>
<button onclick="playAudio('audio5.mp3')">LOG 5</button>

<audio id="player"></audio>

<br><br>
<button onclick="goHome()">BACK</button>
</div>

<script>

/* ================= BOOT ================= */

let started=false;

window.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && !started){
        started=true;
        boot();
    }
});

function boot(){

    document.getElementById("pressEnter").style.display="none";
    document.getElementById("cdcCanvas").style.display="block";

    const c=document.getElementById("cdcCanvas");
    const ctx=c.getContext("2d");

    let particles=[];

    for(let i=0;i<1800;i++){
        particles.push({
            x:Math.random()*520,
            y:Math.random()*520,
            tx:260+Math.cos(i)*140,
            ty:260+Math.sin(i)*140
        });
    }

    let start=Date.now();

    function animate(){

        ctx.fillStyle="black";
        ctx.fillRect(0,0,520,520);

        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.arc(260,260,140,0,Math.PI*2);
        ctx.stroke();

        ctx.font="50px VT323";
        ctx.textAlign="center";
        ctx.textBaseline="middle";

        ctx.fillText("CDC",260,260);

        particles.forEach(p=>{
            p.x+=(p.tx-p.x)*0.02;
            p.y+=(p.ty-p.y)*0.02;
            ctx.fillRect(p.x,p.y,2,2);
        });

        let t=(Date.now()-start)/1000;

        if(t<3){
            document.getElementById("bootText").innerText="CONNECTING...";
        }else if(t<6){
            document.getElementById("bootText").innerText="LOADING ARCHIVE...";
        }else{
            document.getElementById("bootText").innerText="ACCESS GRANTED";
        }

        if(t<9){
            requestAnimationFrame(animate);
        }else{
            document.getElementById("bootScreen").style.display="none";
        }
    }

    animate();
}

/* ================= NAV ================= */

function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function openReports(){show("reports")}
function openLogs(){show("logs")}
function goHome(){show("home")}

/* ================= AUDIO ================= */

function playAudio(src){
    const p=document.getElementById("player");
    p.src=src;
    p.play();
}

</script>

</body>
</html>
