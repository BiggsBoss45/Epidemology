<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Epidemic Intelligence Service</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
    overflow-x:hidden;
    animation:flicker 3s infinite;
}

/* ================= CRT ================= */

#crt{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:9998;

    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9997;

    background: radial-gradient(
        circle at center,
        rgba(0,0,0,0) 60%,
        rgba(0,0,0,0.75) 100%
    );
}

/* ================= FLICKER ================= */

@keyframes flicker{
    0%{opacity:1;}
    97%{opacity:0.98;}
    98%{opacity:0.92;}
    100%{opacity:1;}
}

/* ================= VHS TAB DISTORTION ================= */

.glitch{
    animation: glitch 0.2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-3px,1px);}
    40%{transform:translate(3px,-1px);}
    60%{transform:translate(-1px,2px);}
    80%{transform:translate(2px,-2px);}
    100%{transform:translate(0);}
}

/* ================= SECTIONS ================= */

.section{display:none;padding:20px;}
.active{display:block;}

/* ================= BUTTONS ================= */

button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:300px;
    padding:10px;
    font-size:24px;
}

/* ================= IMAGE ================= */

.imgBox{
    width:300px;
    height:300px;
    margin:auto;
    border:1px solid white;
    background-size:cover;
    background-position:center;
}

/* ================= VIDEO ================= */

video{
    width:90%;
    max-width:700px;
    filter:grayscale(1) contrast(1.4);
}

/* ================= BOOT ================= */

#bootScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}

#logo{
    width:60vw;
    max-width:700px;
    opacity:0;
    animation:logoFade 9s forwards;
}

@keyframes logoFade{
    0%{opacity:0;}
    100%{opacity:1;}
}

.subtitle{
    margin-top:20px;
    opacity:0;
    animation:subFade 9s forwards;
}

@keyframes subFade{
    0%{opacity:0;}
    40%{opacity:0;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div id="crt"></div>

<audio id="clickSfx" src="click.mp3"></audio>
<audio id="bootSfx" src="startup.mp3"></audio>

<!-- BOOT -->
<div id="bootScreen">
    <img id="logo" src="EPI.png">
    <div class="subtitle">
        Epidemic Intelligence Service<br>
        Epidemiology
    </div>
</div>

<!-- HOME -->
<div id="home" class="section active">

<h1>Epidemic Intelligence Service</h1>

<button onclick="nav('videos')">VIDEO FILES</button>
<button onclick="nav('password')">AUDIO ARCHIVE</button>

</div>

<!-- PASSWORD -->
<div id="password" class="section">

<h2>ENTER 5 IDENTITIES</h2>

<input id="n1"><br>
<input id="n2"><br>
<input id="n3"><br>
<input id="n4"><br>
<input id="n5"><br>

<br>

<button onclick="check()">UNLOCK</button>
<p id="status"></p>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- AUDIO -->
<div id="audio" class="section">

<h2>AUDIO LOGS</h2>

<button onclick="playAudio('audio1.mp3','img1.jpg')">LOG 1</button>
<button onclick="playAudio('audio2.mp3','img2.jpg')">LOG 2</button>
<button onclick="playAudio('audio3.mp3','img3.jpg')">LOG 3</button>
<button onclick="playAudio('audio4.mp3','img4.jpg')">LOG 4</button>
<button onclick="playAudio('audio5.mp3','img5.jpg')">LOG 5</button>

<audio id="player"></audio>
<div id="imgBox" class="imgBox"></div>

<br>

<button onclick="audioPlayPause()">PLAY/PAUSE</button>
<button onclick="audioRewind()">-10s</button>
<button onclick="audioForward()">+10s</button>

<br><br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- VIDEOS -->
<div id="videos" class="section">

<h2>VIDEO FILES</h2>

<video id="videoPlayer" controls src="video1.mp4"></video><br>

<button onclick="videoPlayPause()">PLAY/PAUSE</button>
<button onclick="videoRewind()">-10s</button>
<button onclick="videoForward()">+10s</button>

<br><br>

<video controls src="video2.mp4"></video><br>
<video controls src="video3.mp4"></video><br>
<video controls src="video4.mp4"></video><br>
<video controls src="video5.mp4"></video><br>
<video controls src="video6.mp4"></video><br>
<video controls src="video7.mp4"></video><br>
<video controls src="video8.mp4"></video><br>
<video controls src="video9.mp4"></video><br>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<script>

/* TAB GLITCH EFFECT */
function nav(id){

    document.body.classList.add("glitch");

    setTimeout(()=>{
        document.body.classList.remove("glitch");
    },250);

    document.querySelectorAll(".section")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

/* AUDIO */
let audio = document.getElementById("player");

function playAudio(src,img){
    audio.src = src;
    audio.play();
    document.getElementById("imgBox").style.backgroundImage=`url(${img})`;
}

function audioPlayPause(){
    audio.paused ? audio.play() : audio.pause();
}

function audioRewind(){
    audio.currentTime = Math.max(0, audio.currentTime-10);
}

function audioForward(){
    audio.currentTime = Math.min(audio.duration, audio.currentTime+10);
}

/* VIDEO */
let video = document.getElementById("videoPlayer");

function videoPlayPause(){
    video.paused ? video.play() : video.pause();
}

function videoRewind(){
    video.currentTime = Math.max(0, video.currentTime-10);
}

function videoForward(){
    video.currentTime = Math.min(video.duration, video.currentTime+10);
}

</script>

</body>
</html>
