<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Epidemic Intelligence Service</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
    overflow-x:hidden;
}

/* CRT */
#crt{
    position:fixed;
    inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
}

/* GLITCH */
.glitch{animation:glitch 0.2s;}
@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-3px,1px);}
    50%{transform:translate(3px,-1px);}
    75%{transform:translate(-1px,2px);}
    100%{transform:translate(0);}
}

/* SECTIONS */
.section{display:none;}
.active{display:block;padding:20px;}

/* BUTTONS */
button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:300px;
    padding:10px;
    font-size:24px;
}

/* BOOT SCREEN */
#bootScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:9999;
}

/* SMALL LOGO */
#logo{
    width:22vw;
    max-width:220px;
    opacity:0;
}

/* BIG SUBTITLE */
#subtitle{
    font-size:52px;
    margin-top:20px;
    opacity:0;
}

/* ENTER PROMPT */
#enterPrompt{
    margin-top:25px;
    font-size:24px;
    opacity:0;
}

/* AUDIO VIS */
#imgBox{
    width:300px;
    height:300px;
    margin:auto;
    border:1px solid white;
    background-size:cover;
    background-position:center;
}

video{
    width:90%;
    max-width:700px;
    filter:grayscale(1) contrast(1.4);
}

</style>
</head>

<body>

<div id="crt"></div>

<audio id="bootSfx" src="startup.mp3"></audio>
<audio id="clickSfx" src="click.mp3"></audio>
<audio id="unlockSfx" src="unlock.mp3"></audio>

<!-- BOOT -->
<div id="bootScreen">
    <img id="logo" src="EPI.png">
    <div id="subtitle">Epidemic Intelligence Service<br>Epidemiology</div>
    <div id="enterPrompt">PRESS ENTER TO CONTINUE</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h1>EIS TERMINAL</h1>
<button onclick="nav('videos')">VIDEO FILES</button>
<button onclick="nav('audio')">AUDIO ARCHIVE</button>
<button onclick="nav('password')">SECURITY ACCESS</button>
</div>

<!-- PASSWORD -->
<div id="password" class="section">
<h2>ENTER 5 IDENTITIES</h2>

<input id="n1"><br>
<input id="n2"><br>
<input id="n3"><br>
<input id="n4"><br>
<input id="n5"><br>

<br>
<button onclick="check()">UNLOCK</button>
<p id="status"></p>
<br>
<button onclick="nav('home')">BACK</button>
</div>

<!-- AUDIO -->
<div id="audio" class="section">
<h2>AUDIO LOGS</h2>

<button onclick="playAudio('audio1.mp3','img1.jpg')">LOG 1</button>
<button onclick="playAudio('audio2.mp3','img2.jpg')">LOG 2</button>
<button onclick="playAudio('audio3.mp3','img3.jpg')">LOG 3</button>
<button onclick="playAudio('audio4.mp3','img4.jpg')">LOG 4</button>
<button onclick="playAudio('audio5.mp3','img5.jpg')">LOG 5</button>

<audio id="player"></audio>
<div id="imgBox"></div>

<br>
<button onclick="audioPlayPause()">PLAY/PAUSE</button>
<button onclick="audioRewind()">-10s</button>
<button onclick="audioForward()">+10s</button>

<br><br>
<button onclick="nav('home')">BACK</button>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>VIDEO FILES</h2>

<video controls src="video1.mp4"></video><br>
<video controls src="video2.mp4"></video><br>
<video controls src="video3.mp4"></video><br>
<video controls src="video4.mp4"></video><br>
<video controls src="video5.mp4"></video><br>
<video controls src="video6.mp4"></video><br>
<video controls src="video7.mp4"></video><br>
<video controls src="video8.mp4"></video><br>
<video controls src="video9.mp4"></video><br>

<br>
<button onclick="nav('home')">BACK</button>
</div>

<script>

let bootDone = false;

/* BOOT */
window.addEventListener("load", () => {

    const logo = document.getElementById("logo");
    const sub = document.getElementById("subtitle");
    const prompt = document.getElementById("enterPrompt");

    let start = Date.now();

    function animate(){
        let t = (Date.now()-start)/1000;
        let f = Math.min(1, t/7);

        logo.style.opacity = f;
        sub.style.opacity = f;
        prompt.style.opacity = f;

        if(t < 7){
            requestAnimationFrame(animate);
        } else {
            bootDone = true;
        }
    }

    animate();
});

/* ENTER TO CONTINUE */
window.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && bootDone){
        document.getElementById("bootScreen").style.display="none";
        document.getElementById("bootSfx").play().catch(()=>{});
    }
});

/* NAV + GLITCH */
function nav(id){
    if(!bootDone) return;

    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),200);

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.getElementById("clickSfx").play().catch(()=>{});
}

/* PASSWORD */
const names=["Sarah","David","Marcus","Olivia","Daniel"];

function check(){
    let input=[
        n1.value.trim(),
        n2.value.trim(),
        n3.value.trim(),
        n4.value.trim(),
        n5.value.trim()
    ];

    let ok = names.every(n => input.includes(n));

    if(ok){
        document.getElementById("unlockSfx").play().catch(()=>{});
        status.innerText="ACCESS GRANTED";
        setTimeout(()=>nav("audio"),800);
    } else {
        status.innerText="ACCESS DENIED";
    }
}

/* AUDIO */
let audio=document.getElementById("player");

function playAudio(s,i){
    audio.src=s;
    audio.play();
    imgBox.style.backgroundImage=`url(${i})`;
}

function audioPlayPause(){audio.paused?audio.play():audio.pause();}
function audioRewind(){audio.currentTime=Math.max(0,audio.currentTime-10);}
function audioForward(){audio.currentTime=Math.min(audio.duration,audio.currentTime+10);}

</script>

</body>
</html>
