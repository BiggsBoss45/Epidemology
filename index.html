<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>CDC VHS ARCHIVE SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
    overflow-x:hidden;
    animation:flicker 3s infinite;
}

/* CRT SCANLINES */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
    pointer-events:none;
}

/* STATIC */
#static{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
    opacity:0.05;
    pointer-events:none;
}

/* FLICKER */
@keyframes flicker{
    0%{opacity:1;}
    97%{opacity:0.95;}
    100%{opacity:1;}
}

/* VHS GLITCH */
@keyframes vhs{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-1px);}
    50%{transform:translate(-2px,1px);}
    75%{transform:translate(1px,2px);}
    100%{transform:translate(0,0);}
}

.vhs{
    animation:vhs .12s infinite;
}

/* BOOT SCREEN */
#bootScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    z-index:99999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#pressEnter{
    font-size:44px;
    animation:flicker 1s infinite;
}

#bootText{
    margin-top:20px;
    font-size:28px;
}

/* SECTIONS */
.section{display:none;padding:20px;}
.active{display:block;}

/* BUTTONS */
button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:320px;
    padding:10px;
    font-size:26px;
}

/* VIDEO */
video{
    width:90%;
    max-width:720px;
    filter:grayscale(1) contrast(1.4);
}

/* IMAGE */
.imgBox{
    width:300px;
    height:300px;
    margin:auto;
    border:1px solid white;
    background-size:cover;
    background-position:center;
}

</style>
</head>

<script>

/* ================= BOOT ================= */

let started=false;

window.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!started){
        started=true;
        boot();
    }
});

function boot(){

    document.getElementById("pressEnter").style.display="none";
    document.getElementById("cdcCanvas").style.display="block";

    const c=document.getElementById("cdcCanvas");
    const ctx=c.getContext("2d");

    let particles=[];

    for(let i=0;i<2000;i++){
        particles.push({
            x:Math.random()*520,
            y:Math.random()*520,
            tx:260+Math.cos(i)*150,
            ty:260+Math.sin(i)*150
        });
    }

    let start=Date.now();

    function animate(){

        ctx.fillStyle="black";
        ctx.fillRect(0,0,520,520);

        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.arc(260,260,150,0,Math.PI*2);
        ctx.stroke();

        ctx.font="52px VT323";
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText("CDC",260,260);

        particles.forEach(p=>{
            p.x+=(p.tx-p.x)*0.02;
            p.y+=(p.ty-p.y)*0.02;
            ctx.fillRect(p.x,p.y,2,2);
        });

        let t=(Date.now()-start)/1000;

        document.getElementById("bootText").innerText =
        t<3 ? "CONNECTING..."
        : t<6 ? "RECOVERING FILES..."
        : "DECRYPTING DATA...";

        if(t<9){
            requestAnimationFrame(animate);
        }else{
            document.getElementById("bootScreen").style.display="none";
        }
    }

    animate();
}

/* ================= VIDEO CONTROL ================= */

function playVid(id){
    document.getElementById(id).play();
}

function rewind(id){
    let v=document.getElementById(id);
    v.playbackRate=-1;
    setTimeout(()=>v.playbackRate=1,1200);
}

function ff(id){
    let v=document.getElementById(id);
    v.playbackRate=3;
    setTimeout(()=>v.playbackRate=1,1200);
}

/* ================= AUDIO + IMAGE ================= */

function playAudio(src,img){

    let p=document.getElementById("player");
    p.src=src;
    p.play();

    document.getElementById("imgBox").style.backgroundImage =
    `url(${img})`;
}

/* ================= NAV ================= */

function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>
