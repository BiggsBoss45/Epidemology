<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Epidemic Intelligence Service</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
    overflow-x:hidden;
}

/* CRT */
#crt{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:9998;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9997;
    background: radial-gradient(
        circle at center,
        rgba(0,0,0,0) 60%,
        rgba(0,0,0,0.75) 100%
    );
}

/* GLITCH */
.glitch{ animation: glitch 0.2s; }

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-3px,1px);}
    50%{transform:translate(3px,-1px);}
    75%{transform:translate(-1px,2px);}
    100%{transform:translate(0);}
}

/* SECTIONS */
.section{display:none;padding:20px;}
.active{display:block;}

/* BUTTONS */
button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:300px;
    padding:10px;
    font-size:24px;
}

/* IMAGE */
.imgBox{
    width:300px;
    height:300px;
    margin:auto;
    border:1px solid white;
    background-size:cover;
    background-position:center;
}

/* VIDEO */
video{
    width:90%;
    max-width:700px;
    filter:grayscale(1) contrast(1.4);
}

/* BOOT SCREEN */
#bootScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}

#logo{
    width:30vw;
    max-width:300px;
    opacity:0;
}

#subtitle{
    margin-top:20px;
    font-size:40px;
    opacity:0;
}

#enterPrompt{
    margin-top:30px;
    font-size:26px;
    opacity:0;
}

</style>
</head>

<body>

<div id="crt"></div>

<audio id="clickSfx" src="click.mp3"></audio>
<audio id="bootSfx" src="startup.mp3"></audio>
<audio id="unlockSfx" src="unlock.mp3"></audio>

<!-- BOOT -->
<div id="bootScreen">
    <img id="logo" src="EPI.png">
    <div id="subtitle">
        Epidemic Intelligence Service<br>
        Epidemiology
    </div>
    <div id="enterPrompt">PRESS ENTER TO CONTINUE</div>
</div>

<!-- HOME -->
<div id="home" class="section active">

<h1>Epidemic Intelligence Service</h1>

<button onclick="nav('videos')">VIDEO FILES</button>
<button onclick="nav('password')">AUDIO ARCHIVE</button>

</div>

<!-- PASSWORD -->
<div id="password" class="section">

<h2>ENTER 5 IDENTITIES</h2>

<input id="n1"><br>
<input id="n2"><br>
<input id="n3"><br>
<input id="n4"><br>
<input id="n5"><br>

<br>

<button onclick="check()">UNLOCK</button>
<p id="status"></p>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- AUDIO -->
<div id="audio" class="section">

<h2>AUDIO LOGS</h2>

<button onclick="playAudio('audio1.mp3','img1.jpg')">LOG 1</button>
<button onclick="playAudio('audio2.mp3','img2.jpg')">LOG 2</button>
<button onclick="playAudio('audio3.mp3','img3.jpg')">LOG 3</button>
<button onclick="playAudio('audio4.mp3','img4.jpg')">LOG 4</button>
<button onclick="playAudio('audio5.mp3','img5.jpg')">LOG 5</button>

<audio id="player"></audio>
<div id="imgBox" class="imgBox"></div>

<br>
<button onclick="audioPlayPause()">PLAY/PAUSE</button>
<button onclick="audioRewind()">-10s</button>
<button onclick="audioForward()">+10s</button>

<br><br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- VIDEOS -->
<div id="videos" class="section">

<h2>VIDEO FILES</h2>

<video controls src="video1.mp4"></video><br>
<video controls src="video2.mp4"></video><br>
<video controls src="video3.mp4"></video><br>
<video controls src="video4.mp4"></video><br>
<video controls src="video5.mp4"></video><br>
<video controls src="video6.mp4"></video><br>
<video controls src="video7.mp4"></video><br>
<video controls src="video8.mp4"></video><br>
<video controls src="video9.mp4"></video><br>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<script>

let bootDone = false;

/* BOOT SEQUENCE */
window.addEventListener("load", () => {

    const logo = document.getElementById("logo");
    const sub = document.getElementById("subtitle");
    const prompt = document.getElementById("enterPrompt");

    document.getElementById("bootSfx").play().catch(()=>{});

    let start = Date.now();

    function animate(){
        let t = (Date.now()-start)/1000;
        let fade = Math.min(1, t/9);

        logo.style.opacity = fade;
        sub.style.opacity = fade;
        prompt.style.opacity = fade;

        if(t < 9){
            requestAnimationFrame(animate);
        } else {
            bootDone = true;
        }
    }

    animate();
});

/* ENTER TO EXIT BOOT */
window.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && bootDone){
        document.getElementById("bootScreen").style.display = "none";
    }
});

/* NAV */
function nav(id){
    if(!bootDone) return;

    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),200);

    document.querySelectorAll(".section")
        .forEach(s => s.classList.remove("active"));

    document.getElementById(id).classList.add("active");

    document.getElementById("clickSfx").play().catch(()=>{});
});

/* PASSWORD SYSTEM */
const names = ["Sarah","David","Marcus","Olivia","Daniel"];

function check(){

    let input = [
        n1.value.trim(),
        n2.value.trim(),
        n3.value.trim(),
        n4.value.trim(),
        n5.value.trim()
    ];

    let ok = names.every(n => input.includes(n));

    if(ok){
        document.getElementById("unlockSfx").play().catch(()=>{});
        document.getElementById("status").innerText = "ACCESS GRANTED";
        setTimeout(()=>nav("audio"),800);
    } else {
        document.getElementById("status").innerText = "ACCESS DENIED";
    }
}

/* AUDIO */
let audio = document.getElementById("player");

function playAudio(src,img){
    audio.src = src;
    audio.play();
    document.getElementById("imgBox").style.backgroundImage=`url(${img})`;
}

function audioPlayPause(){ audio.paused ? audio.play() : audio.pause(); }
function audioRewind(){ audio.currentTime = Math.max(0, audio.currentTime-10); }
function audioForward(){ audio.currentTime = Math.min(audio.duration, audio.currentTime+10); }

</script>

</body>
</html>
