<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CDC ARCHIVE TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
    overflow-x:hidden;
    animation:flicker 3s infinite;
}

/* ================= CRT ================= */

#crt{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:9998;

    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9997;

    background: radial-gradient(
        circle at center,
        rgba(0,0,0,0) 60%,
        rgba(0,0,0,0.75) 100%
    );
}

/* ================= FLICKER ================= */

@keyframes flicker{
    0%{opacity:1;}
    97%{opacity:0.98;}
    98%{opacity:0.92;}
    100%{opacity:1;}
}

/* ================= VHS GLITCH ================= */

.glitch{
    animation: glitch 0.15s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-2px,1px);}
    40%{transform:translate(2px,-1px);}
    60%{transform:translate(-1px,2px);}
    80%{transform:translate(1px,-2px);}
    100%{transform:translate(0);}
}

/* ================= SECTIONS ================= */

.section{display:none;padding:20px;}
.active{display:block;}

/* ================= BUTTONS ================= */

button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:300px;
    padding:10px;
    font-size:24px;
}

/* ================= IMAGE ================= */

.imgBox{
    width:300px;
    height:300px;
    margin:auto;
    border:1px solid white;
    background-size:cover;
    background-position:center;
}

/* ================= VIDEO ================= */

video{
    width:90%;
    max-width:700px;
    filter:grayscale(1) contrast(1.4);
}

/* ================= BOOT ================= */

#bootCanvas{
    width:100vw;
    height:100vh;
    display:block;
}

/* corrupted popup */
.corrupt{
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    color:red;
    font-size:28px;
    opacity:0;
    animation:pop 1.5s forwards;
}

@keyframes pop{
    0%{opacity:0; transform:translateX(-50%) scale(0.5);}
    50%{opacity:1;}
    100%{opacity:0; transform:translateX(-50%) scale(1.2);}
}

</style>
</head>

<body>

<div id="crt"></div>

<audio id="clickSfx" src="click.mp3"></audio>
<audio id="bootSfx" src="startup.mp3"></audio>
<audio id="unlockSfx" src="unlock.mp3"></audio>

<div id="bootScreen">
    <canvas id="bootCanvas"></canvas>
</div>

<!-- HOME -->
<div id="home" class="section active">

<h1>CDC ARCHIVE TERMINAL</h1>

<button onclick="nav('videos')">VIDEO FILES</button>
<button onclick="nav('password')">AUDIO ARCHIVE</button>

</div>

<!-- PASSWORD -->
<div id="password" class="section">

<h2>ENTER 5 IDENTITIES</h2>

<input id="n1"><br>
<input id="n2"><br>
<input id="n3"><br>
<input id="n4"><br>
<input id="n5"><br>

<br>

<button onclick="check()">UNLOCK</button>
<p id="status"></p>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- AUDIO -->
<div id="audio" class="section">

<h2>AUDIO LOGS</h2>

<button onclick="playAudio('audio1.mp3','img1.jpg')">LOG 1</button>
<button onclick="playAudio('audio2.mp3','img2.jpg')">LOG 2</button>
<button onclick="playAudio('audio3.mp3','img3.jpg')">LOG 3</button>
<button onclick="playAudio('audio4.mp3','img4.jpg')">LOG 4</button>
<button onclick="playAudio('audio5.mp3','img5.jpg')">LOG 5</button>

<audio id="player"></audio>
<div id="imgBox" class="imgBox"></div>

<br>

<button onclick="audioPlayPause()">PLAY/PAUSE</button>
<button onclick="audioRewind()">-10s</button>
<button onclick="audioForward()">+10s</button>

<br><br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- VIDEOS -->
<div id="videos" class="section">

<h2>VIDEO FILES</h2>

<video id="videoPlayer" controls src="video1.mp4"></video><br>

<button onclick="videoPlayPause()">PLAY/PAUSE</button>
<button onclick="videoRewind()">-10s</button>
<button onclick="videoForward()">+10s</button>

<br><br>

<video controls src="video2.mp4"></video><br>
<video controls src="video3.mp4"></video><br>
<video controls src="video4.mp4"></video><br>
<video controls src="video5.mp4"></video><br>
<video controls src="video6.mp4"></video><br>
<video controls src="video7.mp4"></video><br>
<video controls src="video8.mp4"></video><br>
<video controls src="video9.mp4"></video><br>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<script>

let bootStarted = false;

/* ================= BOOT ================= */

window.addEventListener("keydown", e=>{
    if(e.key==="Enter" && !bootStarted){
        bootStarted = true;
        document.getElementById("bootSfx").play().catch(()=>{});
        startBoot();
    }
});

/* ================= BOOT SEQUENCE ================= */

function startBoot(){

    const canvas = document.getElementById("bootCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const cx = canvas.width/2;
    const cy = canvas.height/2;

    let start = Date.now();

    function corruptPopup(){
        let div = document.createElement("div");
        div.className="corrupt";
        div.innerText="FILE CORRUPTED // RECOVERING";
        document.body.appendChild(div);
        setTimeout(()=>div.remove(),1500);
    }

    setInterval(()=>{
        if(!bootStarted) return;
        corruptPopup();
    },900);

    function animate(){

        let t = (Date.now()-start)/1000;

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        /* HUGE FADE-IN CDC LOGO */
        let fade = Math.min(1, t/9);

        ctx.globalAlpha = fade;
        ctx.fillStyle="white";
        ctx.textAlign="center";
        ctx.textBaseline="middle";

        let size = canvas.width * 0.25;
        ctx.font = `${size}px VT323`;

        ctx.fillText("CDC", cx, cy);

        ctx.globalAlpha = 1;

        /* VHS noise flicker */
        if(Math.random() < 0.08){
            ctx.fillStyle="rgba(255,255,255,0.03)";
            ctx.fillRect(0,Math.random()*canvas.height,canvas.width,2);
        }

        if(t<9){
            requestAnimationFrame(animate);
        }else{
            document.getElementById("bootScreen").style.display="none";
        }
    }

    animate();
}

/* ================= NAV ================= */

function nav(id){
    document.getElementById("clickSfx").play().catch(()=>{});

    document.querySelectorAll(".section")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

/* ================= AUDIO ================= */

let audio = document.getElementById("player");

function playAudio(src,img){
    audio.src = src;
    audio.play();
    document.getElementById("imgBox").style.backgroundImage=`url(${img})`;
}

function audioPlayPause(){
    if(audio.paused) audio.play();
    else audio.pause();
}

function audioRewind(){
    audio.currentTime = Math.max(0, audio.currentTime-10);
}

function audioForward(){
    audio.currentTime = Math.min(audio.duration, audio.currentTime+10);
}

/* ================= VIDEO ================= */

let video = document.getElementById("videoPlayer");

function videoPlayPause(){
    if(video.paused) video.play();
    else video.pause();
}

function videoRewind(){
    video.currentTime = Math.max(0, video.currentTime-10);
}

function videoForward(){
    video.currentTime = Math.min(video.duration, video.currentTime+10);
}

</script>

</body>
</html>
