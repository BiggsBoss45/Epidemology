<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CDC ARCHIVE TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
}

/* CRT */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
    pointer-events:none;
}

/* SECTIONS */
.section{display:none;padding:20px;}
.active{display:block;}

/* BUTTONS */
button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:300px;
    padding:10px;
    font-size:24px;
}

/* IMAGE */
.imgBox{
    width:300px;
    height:300px;
    margin:auto;
    border:1px solid white;
    background-size:cover;
    background-position:center;
}

/* VIDEO */
video{
    width:90%;
    max-width:700px;
    filter:grayscale(1) contrast(1.4);
}

</style>
</head>

<body>

<!-- AUDIO FILES (EXPLICIT) -->
<audio id="clickSfx" src="click.mp3"></audio>
<audio id="bootSfx" src="startup.mp3"></audio>
<audio id="unlockSfx" src="unlock.mp3"></audio>

<!-- BOOT SCREEN -->
<div id="bootScreen">
    <h1>PRESS ENTER</h1>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h1>CDC ARCHIVE</h1>

<button onclick="nav('videos')">VIDEO FILES</button>
<button onclick="nav('password')">AUDIO ARCHIVE</button>

</div>

<!-- PASSWORD -->
<div id="password" class="section">

<h2>ENTER 5 IDENTITIES</h2>

<input id="n1"><br>
<input id="n2"><br>
<input id="n3"><br>
<input id="n4"><br>
<input id="n5"><br>

<br>

<button onclick="check()">UNLOCK</button>
<p id="status"></p>

</div>

<!-- AUDIO -->
<div id="audio" class="section">

<h2>AUDIO LOGS</h2>

<button onclick="playAudio('audio1.mp3','img1.jpg')">LOG 1</button>
<button onclick="playAudio('audio2.mp3','img2.jpg')">LOG 2</button>
<button onclick="playAudio('audio3.mp3','img3.jpg')">LOG 3</button>
<button onclick="playAudio('audio4.mp3','img4.jpg')">LOG 4</button>
<button onclick="playAudio('audio5.mp3','img5.jpg')">LOG 5</button>

<audio id="player"></audio>

<div id="imgBox" class="imgBox"></div>

</div>

<!-- VIDEOS (EXPLICITLY LISTED 1–9) -->
<div id="videos" class="section">

<h2>VIDEO FILES</h2>

<video controls src="video1.mp4"></video><br>
<video controls src="video2.mp4"></video><br>
<video controls src="video3.mp4"></video><br>
<video controls src="video4.mp4"></video><br>
<video controls src="video5.mp4"></video><br>
<video controls src="video6.mp4"></video><br>
<video controls src="video7.mp4"></video><br>
<video controls src="video8.mp4"></video><br>
<video controls src="video9.mp4"></video><br>

</div>

<script>

/* ================= BOOT ================= */

let started=false;

window.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!started){
        started=true;

        document.getElementById("bootSfx").play().catch(()=>{});

        setTimeout(()=>{
            document.getElementById("bootScreen").style.display="none";
        },2500);
    }
});

/* ================= NAV ================= */

function nav(id){
    document.getElementById("clickSfx").play().catch(()=>{});

    document.querySelectorAll(".section")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

/* ================= PASSWORD ================= */

const names=["Sarah","David","Marcus","Olivia","Daniel"];

function check(){

    let input=[
        n1.value,n2.value,n3.value,n4.value,n5.value
    ];

    let ok = names.every(n=>input.includes(n));

    if(ok){
        document.getElementById("unlockSfx").play().catch(()=>{});
        document.getElementById("status").innerText="ACCESS GRANTED";
        setTimeout(()=>nav("audio"),800);
    }else{
        document.getElementById("status").innerText="DENIED";
    }
}

/* ================= AUDIO ================= */

function playAudio(src,img){

    let p=document.getElementById("player");
    p.src=src;
    p.play();

    document.getElementById("imgBox").style.backgroundImage=
    `url(${img})`;
}

</script>

</body>
</html>
