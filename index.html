<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CDC ARCHIVE TERMINAL</title>

<!-- FIXED FONT LINK -->
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
    margin:0;
    background:black;
    color:white;
    font-family:'VT323', monospace;
    text-align:center;
    overflow-x:hidden;
    animation:flicker 3s infinite;
}

/* ================= CRT (FIXED FULL SCREEN) ================= */

#crt{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:9998;

    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(0,0,0,0.05) 2px
    );
}

/* vignette (FIXED SAFE LAYER) */
body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9997;

    background: radial-gradient(
        circle at center,
        rgba(0,0,0,0) 60%,
        rgba(0,0,0,0.75) 100%
    );
}

/* ================= FLICKER ================= */

@keyframes flicker{
    0%{opacity:1;}
    97%{opacity:0.98;}
    98%{opacity:0.92;}
    100%{opacity:1;}
}

/* ================= SECTIONS ================= */

.section{display:none;padding:20px;}
.active{display:block;}

/* ================= BUTTONS ================= */

button{
    font-family:'VT323';
    background:black;
    color:white;
    border:1px solid white;
    width:300px;
    padding:10px;
    font-size:24px;
}

/* ================= IMAGE ================= */

.imgBox{
    width:300px;
    height:300px;
    margin:auto;
    border:1px solid white;
    background-size:cover;
    background-position:center;
}

/* ================= VIDEO ================= */

video{
    width:90%;
    max-width:700px;
    filter:grayscale(1) contrast(1.4);
}

/* ================= BOOT CANVAS ================= */

#bootCanvas{
    width:100vw;
    height:100vh;
    display:block;
}

</style>
</head>

<body>

<!-- CRT -->
<div id="crt"></div>

<!-- AUDIO -->
<audio id="clickSfx" src="click.mp3"></audio>
<audio id="bootSfx" src="startup.mp3"></audio>
<audio id="unlockSfx" src="unlock.mp3"></audio>

<!-- BOOT -->
<div id="bootScreen">
    <canvas id="bootCanvas"></canvas>
</div>

<!-- HOME -->
<div id="home" class="section active">

<h1>CDC ARCHIVE TERMINAL</h1>

<button onclick="nav('videos')">VIDEO FILES</button>
<button onclick="nav('password')">AUDIO ARCHIVE</button>

</div>

<!-- PASSWORD -->
<div id="password" class="section">

<h2>ENTER 5 IDENTITIES</h2>

<input id="n1"><br>
<input id="n2"><br>
<input id="n3"><br>
<input id="n4"><br>
<input id="n5"><br>

<br>

<button onclick="check()">UNLOCK</button>
<p id="status"></p>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- AUDIO -->
<div id="audio" class="section">

<h2>AUDIO LOGS</h2>

<button onclick="playAudio('audio1.mp3','img1.jpg')">LOG 1</button>
<button onclick="playAudio('audio2.mp3','img2.jpg')">LOG 2</button>
<button onclick="playAudio('audio3.mp3','img3.jpg')">LOG 3</button>
<button onclick="playAudio('audio4.mp3','img4.jpg')">LOG 4</button>
<button onclick="playAudio('audio5.mp3','img5.jpg')">LOG 5</button>

<audio id="player"></audio>

<div id="imgBox" class="imgBox"></div>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<!-- VIDEOS -->
<div id="videos" class="section">

<h2>VIDEO FILES</h2>

<video controls src="video1.mp4"></video><br>
<video controls src="video2.mp4"></video><br>
<video controls src="video3.mp4"></video><br>
<video controls src="video4.mp4"></video><br>
<video controls src="video5.mp4"></video><br>
<video controls src="video6.mp4"></video><br>
<video controls src="video7.mp4"></video><br>
<video controls src="video8.mp4"></video><br>
<video controls src="video9.mp4"></video><br>

<br>
<button onclick="nav('home')">BACK</button>

</div>

<script>

/* ================= STATE ================= */

let bootStarted = false;

/* ================= BOOT TRIGGER ================= */

window.addEventListener("keydown", e => {
    if(e.key === "Enter" && !bootStarted){
        bootStarted = true;

        document.getElementById("bootSfx").play().catch(()=>{});

        startBoot();
    }
});

/* ================= CDC PARTICLE BOOT ================= */

function startBoot(){

    const canvas = document.getElementById("bootCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const cx = canvas.width/2;
    const cy = canvas.height/2;

    let particles = [];

    for(let i=0;i<3000;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            tx:cx,
            ty:cy
        });
    }

    let start = Date.now();

    function animate(){

        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        let t=(Date.now()-start)/1000;

        ctx.fillStyle="rgba(255,255,255,0.08)";
        ctx.font="140px VT323";
        ctx.textAlign="center";
        ctx.fillText("CDC",cx,cy);

        particles.forEach(p=>{
            p.x += (p.tx-p.x)*0.03;
            p.y += (p.ty-p.y)*0.03;

            ctx.fillStyle="white";
            ctx.fillRect(p.x,p.y,2,2);
        });

        if(t<9){
            requestAnimationFrame(animate);
        }else{
            document.getElementById("bootScreen").style.display="none";
        }
    }

    animate();
}

/* ================= NAV ================= */

function nav(id){
    document.getElementById("clickSfx").play().catch(()=>{});

    document.querySelectorAll(".section")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

/* ================= PASSWORD ================= */

const names=["Sarah","David","Marcus","Olivia","Daniel"];

function check(){

    let input=[
        n1.value.trim(),
        n2.value.trim(),
        n3.value.trim(),
        n4.value.trim(),
        n5.value.trim()
    ];

    let ok = names.every(n=>input.includes(n));

    if(ok){
        document.getElementById("unlockSfx").play().catch(()=>{});
        document.getElementById("status").innerText="ACCESS GRANTED";
        setTimeout(()=>nav("audio"),800);
    }else{
        document.getElementById("status").innerText="DENIED";
    }
}

/* ================= AUDIO ================= */

function playAudio(src,img){

    let p=document.getElementById("player");
    p.src=src;
    p.play();

    document.getElementById("imgBox").style.backgroundImage=
    `url(${img})`;
}

</script>

</body>
</html>
